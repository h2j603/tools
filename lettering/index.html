<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lettering Tool</title>
    <meta name="description" content="모바일 친화적 레터링/캘리그라피 도구">
    <meta name="theme-color" content="#111113">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="canvas-area">
            <canvas id="drawCanvas"></canvas>
            <div id="canvas-info">
                <span id="canvasInfoText">0 x 0</span>
                <span id="strokeCount">strokes: 0</span>
            </div>
        </div>

        <section id="controls">
            <div class="scroll-container">

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <button id="undoBtn" class="btn-action" title="되돌리기 (Ctrl+Z)">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 7H11C13.2091 7 15 8.79086 15 11C15 13.2091 13.2091 15 11 15H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 4L3 7L6 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        UNDO
                    </button>
                    <button id="redoBtn" class="btn-action" title="다시하기 (Ctrl+Shift+Z)">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13 7H5C2.79086 7 1 8.79086 1 11C1 13.2091 2.79086 15 5 15H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 4L13 7L10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        REDO
                    </button>
                    <button id="clearBtn" class="btn-action danger">CLEAR</button>
                    <button id="exportBtn" class="btn-action primary">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1V10M3 6L7 10L11 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10V12C1 12.5523 1.44772 13 2 13H12C12.5523 13 13 12.5523 13 12V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                        SAVE
                    </button>
                </div>

                <a href="../" class="tool-nav-link">
                    <span class="tool-nav-icon">🔲</span>
                    <span class="tool-nav-text"><strong>Text Mosaic</strong> — 텍스트 모자이크 생성기</span>
                    <span class="tool-nav-arrow">→</span>
                </a>

                <!-- BRUSH SETTINGS -->
                <details class="section-collapsible" open>
                    <summary class="section-toggle"><h2>BRUSH</h2></summary>
                    <div class="section-body">
                        <div class="field">
                            <label>SIZE <span class="val" id="sizeVal">8</span></label>
                            <input type="range" id="brushSize" min="1" max="60" value="8">
                        </div>
                        <div class="field">
                            <label>MIN WIDTH RATIO <span class="val" id="minWidthVal">0.15</span></label>
                            <input type="range" id="minWidthRatio" min="0" max="100" value="15">
                        </div>
                        <div class="field">
                            <label>SMOOTHING <span class="val" id="smoothVal">0.5</span></label>
                            <input type="range" id="smoothing" min="0" max="100" value="50">
                        </div>
                        <div class="field">
                            <label>TAPER START <span class="val" id="taperStartVal">0.1</span></label>
                            <input type="range" id="taperStart" min="0" max="100" value="10">
                        </div>
                        <div class="field">
                            <label>TAPER END <span class="val" id="taperEndVal">0.3</span></label>
                            <input type="range" id="taperEnd" min="0" max="100" value="30">
                        </div>
                        <div class="row-2">
                            <div class="field">
                                <label>COLOR</label>
                                <div class="color-input-wrap">
                                    <input type="color" id="brushColor" value="#e8e8ec">
                                </div>
                            </div>
                            <div class="field">
                                <label>OPACITY <span class="val" id="opacityVal">1.0</span></label>
                                <input type="range" id="brushOpacity" min="0" max="100" value="100">
                            </div>
                        </div>
                    </div>
                </details>

                <!-- CANVAS SETTINGS -->
                <details class="section-collapsible">
                    <summary class="section-toggle"><h2>CANVAS</h2></summary>
                    <div class="section-body">
                        <div class="row-2">
                            <div class="field">
                                <label>WIDTH</label>
                                <input type="number" id="canvasW" value="1080" min="100" max="4096">
                            </div>
                            <div class="field">
                                <label>HEIGHT</label>
                                <input type="number" id="canvasH" value="1080" min="100" max="4096">
                            </div>
                        </div>
                        <div class="field">
                            <label>BG COLOR</label>
                            <div class="color-input-wrap">
                                <input type="color" id="bgColor" value="#0c0c0e">
                            </div>
                        </div>
                        <button id="resizeBtn" class="btn-action" style="margin-top:4px">APPLY SIZE</button>
                    </div>
                </details>

                <!-- PRESETS -->
                <details class="section-collapsible">
                    <summary class="section-toggle"><h2>BRUSH PRESETS</h2></summary>
                    <div class="section-body">
                        <div class="preset-grid">
                            <button class="preset-btn" data-preset="pen">Pen</button>
                            <button class="preset-btn" data-preset="brush">Brush</button>
                            <button class="preset-btn" data-preset="marker">Marker</button>
                            <button class="preset-btn" data-preset="calligraphy">Calligraphy</button>
                        </div>
                    </div>
                </details>

                <!-- GUIDES -->
                <details class="section-collapsible">
                    <summary class="section-toggle"><h2>GUIDES</h2></summary>
                    <div class="section-body">
                        <div class="field">
                            <label>
                                <input type="checkbox" id="showGuides"> SHOW GUIDE LINES
                            </label>
                        </div>
                        <div class="field">
                            <label>ROWS <span class="val" id="guideRowsVal">4</span></label>
                            <input type="range" id="guideRows" min="1" max="12" value="4">
                        </div>
                        <div class="field">
                            <label>PADDING <span class="val" id="guidePadVal">5%</span></label>
                            <input type="range" id="guidePadding" min="0" max="30" value="5">
                        </div>
                    </div>
                </details>

            </div>
        </section>
    </div>

    <script src="sketch.js"></script>
</body>
</html>
