<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lettering Tool</title>
    <meta name="description" content="픽셀로 그리고 벡터로 변환하는 레터링 도구">
    <meta name="theme-color" content="#111113">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="canvas-area">
            <canvas id="drawCanvas"></canvas>
            <div id="canvas-info">
                <span id="canvasInfoText">1080 × 1080</span>
                <span id="zoomLevel">100%</span>
                <span id="pathCount">paths: 0</span>
            </div>
        </div>

        <section id="controls">
            <div class="scroll-container">

                <!-- Tool Bar -->
                <div class="tool-bar">
                    <button class="tool-btn active" data-tool="draw" title="픽셀 그리기 (D)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="3" width="4" height="4" fill="currentColor"/><rect x="9" y="3" width="4" height="4" fill="currentColor" opacity="0.5"/><rect x="3" y="9" width="4" height="4" fill="currentColor" opacity="0.5"/><rect x="9" y="9" width="4" height="4" fill="currentColor"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="erase" title="지우개 (E)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M7 14H14M3.5 14L1.5 12C0.7 11.2 0.7 9.8 1.5 9L9 1.5C9.8 0.7 11.2 0.7 12 1.5L14.5 4C15.3 4.8 15.3 6.2 14.5 7L8 13.5L3.5 14Z" stroke="currentColor" stroke-width="1.3"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="line" title="직선 (L)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 13L13 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="3" cy="13" r="1.5" fill="currentColor"/><circle cx="13" cy="3" r="1.5" fill="currentColor"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="fill" title="채우기 (G)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 10L7 2L12 10" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M2 10H12" stroke="currentColor" stroke-width="1.3"/><path d="M13 10C13 10 15 12 14 13.5C13 15 11 13 13 10Z" fill="currentColor"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="select" title="앵커 편집 (V)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 1L2 12L5.5 8.5L8.5 14L10.5 13L7.5 7L12 6.5L2 1Z" stroke="currentColor" stroke-width="1.3"/></svg>
                    </button>
                    <div class="tool-separator"></div>
                    <button class="tool-btn" id="mirrorBtn" title="미러 (M)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1V15M3 4L1 8L3 12M13 4L15 8L13 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                    </button>
                    <button class="tool-btn" id="fitBtn" title="맞추기">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
                    </button>
                </div>

                <!-- Actions -->
                <div class="quick-actions">
                    <button id="vectorizeBtn" class="btn-action primary" style="flex:2">VECTORIZE (Space)</button>
                    <button id="undoBtn" class="btn-action">UNDO</button>
                    <button id="redoBtn" class="btn-action">REDO</button>
                </div>
                <div class="quick-actions">
                    <button id="exportSvgBtn" class="btn-action primary">SVG</button>
                    <button id="exportPngBtn" class="btn-action">PNG</button>
                    <button id="fullscreenBtn" class="btn-action">FULL</button>
                    <button id="clearBtn" class="btn-action danger">CLEAR</button>
                    <button class="btn-action" onclick="_letteringToggleTheme()">THEME</button>
                </div>

                <a href="../" class="tool-nav-link">
                    <span class="tool-nav-icon">🔲</span>
                    <span class="tool-nav-text"><strong>Text Mosaic</strong> — 텍스트 모자이크 생성기</span>
                    <span class="tool-nav-arrow">→</span>
                </a>

                <!-- VECTORIZE SETTINGS -->
                <details class="section-collapsible" open>
                    <summary class="section-toggle"><h2>VECTORIZE</h2></summary>
                    <div class="section-body">
                        <div class="field">
                            <label>GRID RESOLUTION <span class="val" id="gridResVal">36</span></label>
                            <input type="range" id="gridRes" min="8" max="100" value="36">
                        </div>
                        <div class="field">
                            <label>SMOOTHING <span class="val" id="smoothAmountVal">0.30</span></label>
                            <input type="range" id="smoothAmount" min="0" max="100" value="30">
                        </div>
                        <div class="field">
                            <label>CORNER DETECT <span class="val" id="cornerThresholdVal">0.70</span></label>
                            <input type="range" id="cornerThreshold" min="0" max="100" value="70">
                        </div>
                    </div>
                </details>

                <!-- VIEW -->
                <details class="section-collapsible" open>
                    <summary class="section-toggle"><h2>VIEW</h2></summary>
                    <div class="section-body">
                        <div class="field"><label><input type="checkbox" id="showGrid" checked> GRID</label></div>
                        <div class="field"><label><input type="checkbox" id="showPixels" checked> PIXELS</label></div>
                        <div class="field"><label><input type="checkbox" id="showOutline" checked> OUTLINE</label></div>
                        <div class="field"><label><input type="checkbox" id="showFill" checked> FILL</label></div>
                    </div>
                </details>

                <!-- COLORS -->
                <details class="section-collapsible" open>
                    <summary class="section-toggle"><h2>COLORS</h2></summary>
                    <div class="section-body">
                        <div class="row-2">
                            <div class="field"><label>FILL</label><div class="color-input-wrap"><input type="color" id="fillColor" value="#e8e8ec"></div></div>
                            <div class="field"><label>BG</label><div class="color-input-wrap"><input type="color" id="bgColor" value="#0c0c0e"></div></div>
                        </div>
                    </div>
                </details>

                <!-- REFERENCE IMAGE -->
                <details class="section-collapsible">
                    <summary class="section-toggle"><h2>REFERENCE IMAGE</h2></summary>
                    <div class="section-body">
                        <label for="refImageInput" class="btn-action upload-btn" tabindex="0" role="button">LOAD REFERENCE</label>
                        <input type="file" id="refImageInput" accept="image/*" style="display:none">
                        <div class="field">
                            <label>OPACITY <span class="val" id="refOpacityVal">0.30</span></label>
                            <input type="range" id="refOpacity" min="0" max="100" value="30">
                        </div>
                        <button id="removeRefBtn" class="btn-action danger">REMOVE</button>
                    </div>
                </details>

                <!-- CANVAS -->
                <details class="section-collapsible">
                    <summary class="section-toggle"><h2>CANVAS</h2></summary>
                    <div class="section-body">
                        <div class="preset-grid" style="margin-bottom:6px">
                            <button class="size-preset-btn" data-w="1080" data-h="1080">1080²</button>
                            <button class="size-preset-btn" data-w="1000" data-h="1000">1000²</button>
                        </div>
                        <div class="row-2">
                            <div class="field"><label>W</label><input type="number" id="canvasW" value="1080" min="100" max="4096"></div>
                            <div class="field"><label>H</label><input type="number" id="canvasH" value="1080" min="100" max="4096"></div>
                        </div>
                        <button id="resizeBtn" class="btn-action" style="margin-top:4px">APPLY</button>
                    </div>
                </details>

            </div>
        </section>
    </div>

    <div id="fullscreen-view" class="hidden">
        <canvas id="fullscreenCanvas"></canvas>
        <button id="closeFullscreen" class="close-btn" aria-label="닫기">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 1L17 17M17 1L1 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
    </div>

    <script src="sketch.js"></script>
</body>
</html>
